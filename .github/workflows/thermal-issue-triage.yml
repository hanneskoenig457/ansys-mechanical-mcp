name: Thermal issue triage

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  label-new-stage:
    if: startsWith(github.event.issue.title, '[Thermal Stage]')
    runs-on: ubuntu-latest
    steps:
      - name: Add thermal handoff labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [
                "area:thermal",
                "handoff:backlog",
                "validation:windows-required",
              ],
            });
